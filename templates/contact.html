{% extends "base.html" %}
{% block title %}Contact & Feedback - CineMatch{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card contact-card">
        <div class="auth-header">
            <div class="auth-brand">&#9993;</div>
            <h1>Contact & Feedback</h1>
            <p>Have a suggestion, found a bug, or just want to say hello? We'd love to hear from you.</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-row-2">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" class="form-input" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <select id="subject" name="subject" class="form-input form-select" required>
                    <option value="" disabled selected>Choose a topic...</option>
                    <option value="General Feedback">General Feedback</option>
                    <option value="Feature Request">Feature Request</option>
                    <option value="Bug Report">Bug Report</option>
                    <option value="Recommendation Quality">Recommendation Quality</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" class="form-input form-textarea" rows="5" required placeholder="Tell us what's on your mind..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Message</button>
        </form>

        <div class="contact-meta">
            <p>We read every message and typically respond within 48 hours.</p>
        </div>
    </div>
</div>

{% endblock %}
