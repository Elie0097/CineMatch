{% extends "base.html" %}
{% block title %}Join CineMatch{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-brand">&#9654;</div>
            <h1>Create your account</h1>
            <p>Join CineMatch and discover films made for you</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" required autocomplete="username" autofocus minlength="3" maxlength="30">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required autocomplete="new-password" minlength="6">
                <span class="form-hint">At least 6 characters</span>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-switch">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>

{% endblock %}
